<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- Brutal Metal Scratch Texture -->
  <defs>
    <pattern id="metal-scratches" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Horizontal scratches -->
      <line x1="0" y1="20" x2="200" y2="22" stroke="rgba(180, 170, 150, 0.02)" stroke-width="0.5"/>
      <line x1="0" y1="45" x2="200" y2="44" stroke="rgba(180, 170, 150, 0.015)" stroke-width="0.3"/>
      <line x1="0" y1="78" x2="200" y2="80" stroke="rgba(180, 170, 150, 0.025)" stroke-width="0.4"/>
      <line x1="0" y1="110" x2="200" y2="108" stroke="rgba(180, 170, 150, 0.018)" stroke-width="0.3"/>
      <line x1="0" y1="155" x2="200" y2="157" stroke="rgba(180, 170, 150, 0.02)" stroke-width="0.5"/>

      <!-- Diagonal scratches -->
      <line x1="0" y1="0" x2="200" y2="30" stroke="rgba(180, 170, 150, 0.01)" stroke-width="0.2"/>
      <line x1="50" y1="0" x2="200" y2="80" stroke="rgba(180, 170, 150, 0.012)" stroke-width="0.3"/>
      <line x1="0" y1="100" x2="150" y2="200" stroke="rgba(180, 170, 150, 0.015)" stroke-width="0.2"/>
    </pattern>

    <!-- Weathered Stone Texture -->
    <pattern id="stone-texture" x="0" y="0" width="300" height="300" patternUnits="userSpaceOnUse">
      <!-- Irregular stone cracks -->
      <path d="M 50,20 Q 80,40 100,25 T 150,30" stroke="rgba(0, 0, 0, 0.3)" stroke-width="0.5" fill="none"/>
      <path d="M 200,80 Q 220,100 240,90 T 280,95" stroke="rgba(0, 0, 0, 0.25)" stroke-width="0.4" fill="none"/>
      <path d="M 30,150 Q 50,170 80,160 T 120,165" stroke="rgba(0, 0, 0, 0.2)" stroke-width="0.3" fill="none"/>
      <path d="M 180,220 Q 200,240 230,230 T 270,235" stroke="rgba(0, 0, 0, 0.28)" stroke-width="0.5" fill="none"/>

      <!-- Speckles for weathering -->
      <circle cx="75" cy="50" r="0.5" fill="rgba(180, 170, 150, 0.03)"/>
      <circle cx="140" cy="90" r="0.4" fill="rgba(180, 170, 150, 0.025)"/>
      <circle cx="95" cy="180" r="0.6" fill="rgba(180, 170, 150, 0.035)"/>
      <circle cx="250" cy="120" r="0.3" fill="rgba(180, 170, 150, 0.02)"/>
      <circle cx="40" cy="260" r="0.5" fill="rgba(180, 170, 150, 0.028)"/>
    </pattern>

    <!-- Geometric Elden Ring-style Pattern -->
    <pattern id="rune-pattern" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <!-- Circular motifs -->
      <circle cx="200" cy="200" r="80" stroke="rgba(180, 170, 150, 0.03)" stroke-width="0.5" fill="none"/>
      <circle cx="200" cy="200" r="60" stroke="rgba(180, 170, 150, 0.025)" stroke-width="0.3" fill="none"/>
      <circle cx="200" cy="200" r="100" stroke="rgba(180, 170, 150, 0.02)" stroke-width="0.4" fill="none"/>

      <!-- Radial lines -->
      <line x1="200" y1="120" x2="200" y2="140" stroke="rgba(180, 170, 150, 0.025)" stroke-width="0.5"/>
      <line x1="200" y1="260" x2="200" y2="280" stroke="rgba(180, 170, 150, 0.025)" stroke-width="0.5"/>
      <line x1="120" y1="200" x2="140" y2="200" stroke="rgba(180, 170, 150, 0.025)" stroke-width="0.5"/>
      <line x1="260" y1="200" x2="280" y2="200" stroke="rgba(180, 170, 150, 0.025)" stroke-width="0.5"/>

      <!-- Diagonal crosses -->
      <line x1="160" y1="160" x2="175" y2="175" stroke="rgba(180, 170, 150, 0.02)" stroke-width="0.3"/>
      <line x1="225" y1="225" x2="240" y2="240" stroke="rgba(180, 170, 150, 0.02)" stroke-width="0.3"/>
      <line x1="240" y1="160" x2="225" y2="175" stroke="rgba(180, 170, 150, 0.02)" stroke-width="0.3"/>
      <line x1="175" y1="225" x2="160" y2="240" stroke="rgba(180, 170, 150, 0.02)" stroke-width="0.3"/>
    </pattern>

    <!-- Fog/Mist Gradient -->
    <linearGradient id="fog-gradient-vertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(60, 60, 60, 0.15);stop-opacity:1" />
      <stop offset="50%" style="stop-color:rgba(60, 60, 60, 0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(60, 60, 60, 0.15);stop-opacity:1" />
    </linearGradient>

    <!-- Vignette Effect -->
    <radialGradient id="vignette-radial" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:transparent;stop-opacity:1" />
      <stop offset="70%" style="stop-color:transparent;stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0, 0, 0, 0.8);stop-opacity:1" />
    </radialGradient>

    <!-- Subtle Horizontal Bands (Gallery Wall) -->
    <pattern id="gallery-bands" x="0" y="0" width="100" height="800" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="200" fill="rgba(0, 0, 0, 0.02)"/>
      <rect x="0" y="200" width="100" height="200" fill="transparent"/>
      <rect x="0" y="400" width="100" height="200" fill="rgba(0, 0, 0, 0.015)"/>
      <rect x="0" y="600" width="100" height="200" fill="transparent"/>
    </pattern>

    <!-- Heavy Grain Filter -->
    <filter id="heavy-grain">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="6" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay"/>
    </filter>
  </defs>
</svg>
