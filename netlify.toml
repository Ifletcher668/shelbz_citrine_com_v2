[build]
  base = "frontend"
  publish = "out"
  command = "yarn build && node scripts/sync-uploads.js"
  ignore = "exit 0"  # Skip git-triggered builds; deploys must be triggered via deploy hook

[build.environment]
  NODE_VERSION = "20"

[context.branch-deploy]
  command = "echo 'Branch deploys disabled' && exit 0"
