[build]
  base = "frontend"
  publish = "out"
  command = "npm run build"
  ignore = "exit 0"  # Skip git-triggered builds; deploys must be triggered via deploy hook

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_STRAPI_URL must be set in Netlify dashboard for CMS pages to build
  # If unset, CMS pages are skipped (build still succeeds)

# Only the production site (main branch) runs a real build.
# Branch deploys and deploy previews are disabled — CI checks gate what reaches main.
[context.deploy-preview]
  command = "echo 'Deploy previews disabled' && exit 0"

[context.branch-deploy]
  command = "echo 'Branch deploys disabled' && exit 0"
